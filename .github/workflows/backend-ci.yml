name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  unit-and-security:
    name: Unit + security (parallel forks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Unit tests (excl. @Tag security) + securityTest
        run: ./gradlew test securityTest jacocoTestReport --no-daemon

      - name: bootJar
        run: ./gradlew bootJar --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-reports
          path: |
            build/reports/tests/
            build/test-results/
            build/reports/jacoco/

      - name: Upload JaCoCo exec (unit + security)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec-unit
          path: |
            build/jacoco/test.exec
            build/jacoco/securityTest.exec

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-boot-jar
          path: build/libs/*-SNAPSHOT.jar

  integration-functional:
    name: Integration (Docker + Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-reports
          path: |
            build/reports/tests/integrationTest/
            build/test-results/integrationTest/

      - name: Upload JaCoCo exec (integration)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec-integration
          path: build/jacoco/integrationTest.exec

  coverage-gate:
    name: JaCoCo gate (security 75% + services floor)
    needs: [unit-and-security, integration-functional]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Compile main (classes for JaCoCo)
        run: ./gradlew classes --no-daemon

      - name: Download JaCoCo exec (unit + security)
        uses: actions/download-artifact@v4
        with:
          name: jacoco-exec-unit
          path: dl-jacoco-unit

      - name: Download JaCoCo exec (integration)
        uses: actions/download-artifact@v4
        with:
          name: jacoco-exec-integration
          path: dl-jacoco-int

      - name: Merge exec into build/jacoco
        run: |
          mkdir -p build/jacoco
          # upload-artifact сохраняет относительные пути (build/jacoco/*.exec)
          cp dl-jacoco-unit/build/jacoco/test.exec build/jacoco/test.exec
          cp dl-jacoco-unit/build/jacoco/securityTest.exec build/jacoco/securityTest.exec
          cp dl-jacoco-int/build/jacoco/integrationTest.exec build/jacoco/integrationTest.exec

      - name: Verify coverage (security ≥75%, service.impl ≥55%, util ≥57%)
        run: ./gradlew jacocoKeyPackagesVerifyMergedCi --no-daemon
