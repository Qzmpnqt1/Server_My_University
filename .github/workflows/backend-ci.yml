name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  unit-and-security:
    name: Unit + security (parallel forks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Unit tests (excl. @Tag security) + securityTest
        run: ./gradlew test securityTest jacocoTestReport --no-daemon

      - name: bootJar
        run: ./gradlew bootJar --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-reports
          path: |
            build/reports/tests/
            build/test-results/
            build/reports/jacoco/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-boot-jar
          path: build/libs/*-SNAPSHOT.jar

  integration-functional:
    name: Integration (Docker + Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-reports
          path: |
            build/reports/tests/integrationTest/
            build/test-results/integrationTest/
