name: Backend CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "После push образа выполнить SSH deploy (нужны secrets)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.lowercase }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase)
        id: image
        run: |
          echo "lowercase=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.lowercase }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image reference
        run: |
          echo "Published tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: docker-publish
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check SSH secrets
        env:
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          PATH_REMOTE: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          missing=0
          for name in HOST USER KEY PATH_REMOTE; do
            eval "v=\${$name}"
            if [ -z "$v" ]; then echo "::error::Missing secret DEPLOY_${name} (use DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY, DEPLOY_REMOTE_PATH)"; missing=1; fi
          done
          exit "$missing"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_REMOTE_PATH }}"
            # Ожидается docker compose с сервисом app и образом из GHCR; подставьте свой .env на сервере.
            docker compose pull app
            docker compose up -d app
