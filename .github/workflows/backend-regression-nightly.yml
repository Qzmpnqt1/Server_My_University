name: Backend regression (nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: gradle/actions/wrapper-validation@v4

      - name: Full regression (unit + security + integration)
        run: ./gradlew regressionTest --no-daemon

      - name: JaCoCo full report
        if: success()
        run: ./gradlew jacocoFullReport --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
