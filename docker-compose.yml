services:
  mysql:
    image: mysql:8.0
    container_name: my_university_mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: my_university
      MYSQL_ROOT_PASSWORD: root
    # На хосте 3306 часто занят локальным MySQL — наружу отдаём 3307 (внутри сети compose всё равно mysql:3306)
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: my_university_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=my_university_cluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_DC=datacenter1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: always
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init-scripts:/init-scripts
    command: >
      bash -c '
        echo "Waiting for Cassandra to be ready..."
        sleep 10
        echo "Creating keyspace and tables..."
        cqlsh cassandra -f /init-scripts/init-cassandra.cql
        echo "Cassandra initialization complete."
      '
    restart: on-failure

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_university_app
    ports:
      - "${APP_HTTPS_HOST_PORT:-8443}:8443"
    depends_on:
      mysql:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      # Профиль docker: см. application-docker.properties (Flyway checksum после правок V15 и т.п.)
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8443"
      APP_OPENAPI_SERVER_URL: "https://localhost:8443"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/my_university?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_CASSANDRA_KEYSPACE_NAME: my_university_chat
    restart: on-failure

volumes:
  mysql_data:
  cassandra_data:
