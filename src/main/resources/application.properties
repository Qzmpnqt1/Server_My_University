server.address=0.0.0.0
# Публичный API только по HTTPS (встроенный Tomcat + classpath:dev-keystore.p12). Пароль хранилища: SSL_KEYSTORE_PASSWORD.
server.port=${SERVER_PORT:8443}
server.ssl.enabled=true
server.ssl.key-store=classpath:dev-keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:devchangeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=dev
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# Если порт 8443 занят, задайте другой: PowerShell: $env:SERVER_PORT="8444"; .\gradlew.bat bootRun

# MySQL — пароль root как в docker-compose; порт по умолчанию 3307 (compose публикует 3307→3306, чтобы не конфликтовать с локальным MySQL на 3306).
# Если bootRun: "Access denied...", см. комментарии ниже.
#   1) Поднять БД: docker compose up -d mysql (порт на хосте 3307), затем bootRun.
#   2) Создайте файл application-local.properties в КОРНЕ этого модуля (рядом с gradlew.bat):
#        скопируйте application-local.properties.example → application-local.properties
#        и пропишите пароль от вашего MySQL. bootRun подхватит профиль local автоматически.
#   3) Или переменные окружения (PowerShell):
#        $env:SPRING_DATASOURCE_PASSWORD="ваш_пароль"
# useUnicode + characterEncoding: кириллица из MySQL не превращается в «????» в JSON/API
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/my_university?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.connect-retries=1
# В Spring Boot 3.3 нет spring.flyway.repair-on-migrate (игнорируется). Repair — в FlywayRepairConfig.
# false: только migrate (строгая проверка checksum). true: repair() затем migrate() при каждом старте.
app.flyway.repair-before-migrate=true

# JWT
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6a8a3d9
jwt.expiration=86400000

# OpenAPI «Servers» (только HTTPS)
app.openapi.server-url=${APP_OPENAPI_SERVER_URL:https://localhost:8443}

# Cassandra — disable Spring Boot auto-configuration, use manual CqlSession bean
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=my_university_chat
spring.cassandra.schema-action=none
spring.data.cassandra.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.cassandra.CassandraReactiveRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.cassandra.CassandraRepositoriesAutoConfiguration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.cassandra.enabled=false

# Logging
logging.level.org.flywaydb=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.example=INFO
logging.level.org.example.config.HttpRequestLoggingFilter=INFO
logging.level.org.example.service.impl.StatisticsServiceImpl=DEBUG
logging.level.org.example.service.impl.TeacherGradingCatalogServiceImpl=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n
