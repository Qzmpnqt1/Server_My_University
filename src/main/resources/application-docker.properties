# Профиль для docker compose (см. SPRING_PROFILES_ACTIVE=docker в docker-compose.yml).
# Cassandra: при старте приложение несколько раз пытается подключиться (см. CassandraConfig).
# При необходимости: app.cassandra.connect-max-attempts=60, app.cassandra.connect-delay-ms=3000
# После изменения уже применённых миграций Flyway ругается на checksum — в контейнере это мешает старту.
# Для продакшена без этого профиля валидация остаётся включённой (по умолчанию в application.properties).
# Если нужна строгая согласованность без отключения валидации:
#   - обновить checksum: flyway repair (тот же JDBC URL, что у приложения);
#   - или чистая БД: docker compose down -v && docker compose up -d (данные удалятся).
spring.flyway.validate-on-migrate=false
