# Профиль для Testcontainers (AbstractIntegrationTest). Без HTTPS — удобный TestRestTemplate.
spring.main.banner-mode=off
server.ssl.enabled=false
server.port=0

logging.level.root=WARN
logging.level.org.example=INFO
logging.level.org.flywaydb=INFO

# JWT для IT (длина >= требований HS256 в проекте)
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration=86400000

# Cassandra: даём контейнеру время на старт
app.cassandra.connect-max-attempts=50
app.cassandra.connect-delay-ms=500

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Стабильный пул при длительном одном JVM + Testcontainers (меньше «мертвых» коннектов)
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.keepalive-time=30000

# OpenAPI не обязателен для тестов
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
